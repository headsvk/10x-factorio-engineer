<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10x Factorio Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ── Theme variables: dark (default) ── */
    :root {
      --bg:           #100f09;
      --bg-card:      #1c1a11;
      --bg-input:     #252318;
      --border:       #342f1c;
      --border-sub:   #28241a;
      --text:         #ece7d2;
      --text-muted:   #8a7f64;
      --text-dim:     #5a5040;
      --accent:       #f59e0b;
      --accent-hover: #fbbf24;
      --ok:           #4ade80;
      --ok-bg:        rgba(74,222,128,.07);
      --ok-border:    rgba(74,222,128,.2);
      --warn:         #fbbf24;
      --warn-bg:      rgba(251,191,36,.09);
      --warn-border:  rgba(251,191,36,.25);
      --bad:          #f87171;
      --bad-bg:       rgba(248,113,113,.09);
      --bad-border:   rgba(248,113,113,.25);
      font-family: 'Barlow Condensed', system-ui, sans-serif;
    }

    /* ── Light theme ── */
    [data-theme="light"] {
      --bg:           #faf9f2;
      --bg-card:      #fffcf0;
      --bg-input:     #f0e8d5;
      --border:       #e8dfc5;
      --border-sub:   #f0e8d5;
      --text:         #1c1608;
      --text-muted:   #6b5f42;
      --text-dim:     #7a6d4d;
      --accent:       #b45309;
      --accent-hover: #92400e;
      --ok:           #16a34a;
      --ok-bg:        rgba(22,163,74,.07);
      --ok-border:    rgba(22,163,74,.22);
      --warn:         #b45309;
      --warn-bg:      rgba(180,83,9,.07);
      --warn-border:  rgba(180,83,9,.22);
      --bad:          #dc2626;
      --bad-bg:       rgba(220,38,38,.07);
      --bad-border:   rgba(220,38,38,.2);
    }

    /* ── Respect OS preference when no manual override ── */
    @media (prefers-color-scheme: light) {
      :root:not([data-theme]) {
        --bg:           #faf9f2;
        --bg-card:      #fffcf0;
        --bg-input:     #f0e8d5;
        --border:       #e8dfc5;
        --border-sub:   #f0e8d5;
        --text:         #1c1608;
        --text-muted:   #6b5f42;
        --text-dim:     #7a6d4d;
        --accent:       #b45309;
        --accent-hover: #92400e;
        --ok:           #16a34a;
        --ok-bg:        rgba(22,163,74,.07);
        --ok-border:    rgba(22,163,74,.22);
        --warn:         #b45309;
        --warn-bg:      rgba(180,83,9,.07);
        --warn-border:  rgba(180,83,9,.22);
        --bad:          #dc2626;
        --bad-bg:       rgba(220,38,38,.07);
        --bad-border:   rgba(220,38,38,.2);
      }
    }

    body { background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; overflow-y: scroll; }

    /* ── Layout ── */
    .header {
      border-bottom: 1px solid var(--border-sub);
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px; background: var(--bg-card);
    }
    .header-left { display: flex; flex-direction: column; gap: 2px; }
    .header-title-row { display: flex; align-items: center; gap: 8px; }
    .header-title { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 900;
                    color: var(--accent); letter-spacing: .06em; text-transform: uppercase; }
    .header-save  { font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .main { padding: 16px; }
    .main-inner { max-width: 1280px; margin-inline: auto; }

    /* ── Storage pill ── */
    .storage-pill { font-size: 10px; border: 1px solid; border-radius: 3px; padding: 0 8px;
                    height: 28px; display: inline-flex; align-items: center; line-height: 1;
                    font-family: 'JetBrains Mono', monospace; letter-spacing: .02em; }
    .storage-pill.cloud { background: var(--ok-bg); color: var(--ok); border-color: var(--ok-border); }
    .storage-pill.local { background: transparent; color: var(--text-muted); border-color: var(--border); }
    .storage-pill.none  { background: var(--bad-bg); color: var(--bad); border-color: var(--bad-border); }

    /* ── Badges ── */
    .badges { display: flex; gap: 4px; flex-wrap: wrap; }
    .badge { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
             letter-spacing: .05em; text-transform: uppercase;
             border: 1px solid var(--border); border-radius: 3px; padding: 1px 7px; color: var(--text-muted); }
    .badge.purple { border-color: rgba(139,92,246,.4); color: #c084fc; background: rgba(88,28,135,.15); }

    /* ── Buttons ── */
    button { cursor: pointer; border: none; font-family: 'Barlow Condensed', sans-serif;
             font-size: 13px; font-weight: 700; letter-spacing: .05em;
             display: inline-flex; align-items: center; gap: 4px; transition: background .15s, color .15s; }
    .btn-group { display: flex; gap: 4px; }
    .btn       { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-muted);
                 border-radius: 3px; padding: 3px 10px; height: 28px; text-transform: uppercase; }
    .btn:hover { background: var(--border); color: var(--text); }
    .btn-ghost { background: transparent; border: none; color: var(--text-dim);
                 border-radius: 3px; padding: 3px 8px; height: 28px; }
    .btn-ghost:hover { background: var(--bg-input); color: var(--text); }
    .btn-primary { background: var(--accent); border: none; color: #1c1508;
                   border-radius: 3px; padding: 4px 16px; font-weight: 900; text-transform: uppercase; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-cancel { background: transparent; border: none; color: var(--text-muted);
                  border-radius: 3px; padding: 4px 12px; text-transform: uppercase; }
    .btn-cancel:hover { background: var(--bg-input); }

    /* ── Section label (two tiers) ── */
    /* sub-label: column headers, card meta, inline labels */
    .section-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
                     text-transform: uppercase; letter-spacing: .1em; color: var(--text-dim); margin-bottom: 10px; }
    /* group-label: top-level group headings (Science Targets, Bus Balance, Bottlenecks, etc.) */
    .group-label { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
                   text-transform: uppercase; letter-spacing: .1em; color: var(--text-muted);
                   margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border-sub); }

    /* ── Science section ── */
    .science-section { background: var(--bg-card); border: 1px solid var(--border-sub);
                       border-left: 3px solid var(--accent);
                       border-radius: 4px; padding: 14px 16px; margin-bottom: 10px; }
    .loc-divider { border: none; border-top: 1px solid var(--border-sub); margin: 0 0 10px; }
    .science-grid.cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px; }
    .science-bar { margin-bottom: 12px; }
    .science-bar:last-child { margin-bottom: 0; }
    .science-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .science-name { display: flex; align-items: center; gap: 8px; font-family: 'Barlow Condensed', sans-serif;
                    font-size: 14px; font-weight: 700; letter-spacing: .02em; color: var(--text); }
    .science-dot  { flex-shrink: 0; display: block; }
    .science-meta { display: flex; align-items: center; gap: 12px; }
    .rate-text    { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
    .pct-text     { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; font-variant-numeric: tabular-nums; width: 36px; text-align: right; }
    /* Bar sizing: --bar-primary (science targets), --bar-unit (all other bars) */
    :root { --bar-primary: 10px; --bar-unit: 4px; }
    .progress-track { height: var(--bar-primary); background: var(--bg-input); border-radius: 3px; overflow: hidden; }
    .progress-fill  { height: 100%; border-radius: 3px; transition: width .5s ease; }

    /* ── Research section ── */
    .research-section { background: var(--bg-card); border: 1px solid var(--border-sub);
                        border-left: 3px solid var(--accent);
                        border-radius: 4px; padding: 10px 16px; margin-bottom: 10px; }
    .research-header  { display: flex; align-items: center; justify-content: space-between;
                        margin-bottom: 0; cursor: pointer; user-select: none;
                        font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
                        text-transform: uppercase; letter-spacing: .1em; color: var(--text-muted); }
    .research-header-main { display: flex; align-items: center; gap: 8px; }
    .research-chevron { color: var(--text-dim); font-size: 10px; }
    .research-count-pill { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500;
                           color: var(--text-dim); background: var(--bg-input); border-radius: 3px;
                           padding: 1px 7px; letter-spacing: 0; text-transform: none; }
    .research-body    { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-sub); }
    .research-grid    { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
    .research-row     { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .research-label   { font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
                        color: var(--text); letter-spacing: .02em; }
    .research-input   { width: 58px; text-align: right; background: var(--bg-input);
                        border: 1px solid var(--border); border-radius: 3px;
                        color: var(--text); font-family: 'JetBrains Mono', monospace;
                        font-size: 12px; padding: 2px 6px; height: 24px; }
    .research-input:focus { outline: none; border-color: var(--accent); }
    .research-subgroup-label { grid-column: 1 / -1; font-family: 'Barlow Condensed', sans-serif;
                               font-size: 10px; font-weight: 800; text-transform: uppercase;
                               letter-spacing: .12em; color: var(--text-dim); margin-top: 4px; }

    /* Line-card research chips (stale / capped) */
    .card-chip { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700;
                 text-transform: uppercase; letter-spacing: .05em; border-radius: 3px;
                 padding: 1px 6px; border: 1px solid; display: inline-flex; align-items: center; }
    .card-chip.stale  { color: var(--warn); border-color: var(--warn-border); background: var(--warn-bg); }
    .card-chip.capped { color: var(--text-dim); border-color: var(--border); background: var(--bg-input); }

    /* ── Bottleneck banner ── */
    .bottleneck-banner { background: var(--bad-bg); border: 1px solid var(--bad-border);
                         border-left: 3px solid var(--bad);
                         border-radius: 4px; padding: 12px 16px; margin-bottom: 16px; }
    .bottleneck-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 800;
                        letter-spacing: .05em; text-transform: uppercase; color: var(--bad); margin-bottom: 8px; }
    .bottleneck-item  { font-size: 13px; color: var(--bad); opacity: .75; margin-bottom: 4px; }
    .bottleneck-item:last-child { margin-bottom: 0; }

    /* ── Tabs ── */
    .tab-list { display: flex; background: var(--bg-card); border: 1px solid var(--border-sub);
                border-radius: 4px; padding: 2px; margin-bottom: 16px; gap: 2px; }
    .tab-btn  { background: transparent; border: none; color: var(--text-muted);
                border-radius: 3px; padding: 4px 14px; height: 28px;
                font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
                letter-spacing: .05em; text-transform: uppercase; }
    .tab-btn.active             { background: var(--accent); color: #1c1508; }
    .tab-btn:hover:not(.active) { background: var(--bg-input); }
    .tab-panel                  { display: none; }
    .tab-panel.active           { display: block; }

    /* ── SPM headline ── */
    .spm-headline { display: flex; align-items: baseline; gap: 8px; margin-bottom: 14px; }
    .spm-number   { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700;
                    font-variant-numeric: tabular-nums; line-height: 1; }
    .spm-target   { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 500;
                    font-variant-numeric: tabular-nums; line-height: 1; color: var(--text-muted); }
    .spm-sep      { font-family: 'JetBrains Mono', monospace; font-size: 24px; color: var(--text-dim); line-height: 1; }
    .spm-label    { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900;
                    letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); }

    /* ── Overview ── */
    .overview-line { padding: 10px 12px; border-radius: 4px; border: 1px solid; margin-bottom: 6px; }
    .overview-line.ok   { background: var(--ok-bg);   border-color: var(--ok-border);   border-left: 3px solid var(--ok);   }
    .overview-line.warn { background: var(--warn-bg);  border-color: var(--warn-border);  border-left: 3px solid var(--warn);  }
    .overview-line.bad  { background: var(--bad-bg);   border-color: var(--bad-border);   border-left: 3px solid var(--bad);   }
    .overview-line-header { display: flex; justify-content: space-between; align-items: center; }
    .overview-line-name   { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700;
                            letter-spacing: .02em; color: var(--text); }
    .overview-stats       { display: flex; align-items: center; gap: 12px; }
    .pct-lg { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700;
              font-variant-numeric: tabular-nums; width: 40px; text-align: right; }
    .mini-bar      { height: var(--bar-unit); background: var(--bg-input); border-radius: 2px; margin-top: 6px; }
    .mini-bar-fill { height: 100%; border-radius: 2px; transition: width .5s; }

    /* ── Bus balance ── */
    .bus-section { margin-bottom: 16px; }
    .bus-group { margin-bottom: 10px; }
    .bus-group:last-child { margin-bottom: 0; }
    .bus-group-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 800;
                       text-transform: uppercase; letter-spacing: .12em; margin-bottom: 5px;
                       padding-left: 10px; }
    .bus-group-label--belt { color: var(--accent); border-bottom: 1px solid var(--border-sub); padding-bottom: 4px; }
    .bus-group-label--pipe { color: #5b9fd4; border-bottom: 1px solid var(--border-sub); padding-bottom: 4px; }
    .bus-row { padding: 9px 12px; border-radius: 4px; border: 1px solid var(--border-sub);
               background: var(--bg-card); margin-bottom: 4px; }
    .bus-row--fluid { border-left: 2px solid #3a7ab8; }
    .bus-row:last-child { margin-bottom: 0; }
    .bus-row-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 5px; }
    .bus-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px;
                letter-spacing: .02em; }
    .bus-net-group { display: flex; align-items: baseline; gap: 4px; }
    .bus-net { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; }
    .bus-belt-tag { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 800;
                    letter-spacing: .08em; text-transform: uppercase; opacity: .6; }
    .bus-bar-track { height: var(--bar-unit); border-radius: 3px; overflow: hidden; margin-bottom: 5px;
                     display: flex; }
    .bus-bar-consumed { height: 100%; transition: width .4s ease; }
    .bus-bar-free { height: 100%; flex: 1; transition: background .4s ease; }
    .bus-meta { display: flex; justify-content: space-between;
                font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }

    /* ── Next steps ── */
    .next-steps { margin-top: 16px; }
    .next-step-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 12px;
                      border-radius: 4px; background: var(--ok-bg); border: 1px solid var(--ok-border);
                      border-left: 3px solid var(--ok);
                      font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
    .next-step-item:last-child { margin-bottom: 0; }
    .arrow { color: var(--ok); opacity: .7; flex-shrink: 0; margin-top: 1px; }

    /* ── Line cards ── */
    .line-card { border-radius: 4px; border: 1px solid; background: var(--bg-card); margin-bottom: 8px; overflow: hidden; }
    .line-card.ok   { border-color: var(--ok-border);   border-left: 3px solid var(--ok);   }
    .line-card.warn { border-color: var(--warn-border);  border-left: 3px solid var(--warn);  }
    .line-card.bad  { border-color: var(--bad-border);   border-left: 3px solid var(--bad);   }
    .line-card.wip  { border-color: var(--warn-border);  border-left: 3px dashed var(--warn); }
    .line-card.wip .card-header { opacity: .75; }
    .wip-badge { display: inline-flex; align-items: center; font-family: 'Barlow Condensed', sans-serif;
                 font-size: 9px; font-weight: 700; letter-spacing: .08em; color: var(--warn);
                 background: var(--warn-bg); border: 1px solid var(--warn-border);
                 padding: 1px 5px; border-radius: 3px; margin-left: 5px; vertical-align: middle; flex-shrink: 0; }

    .card-header { display: flex; align-items: center; justify-content: space-between;
                   padding: 10px 16px; cursor: pointer; user-select: none;
                   background: var(--bg-card); transition: background .12s; }
    .card-header:hover { background: var(--bg-input); }
    .card-header-left  { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .card-title-group  { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .card-subtitle     { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600;
                         text-transform: uppercase; letter-spacing: .1em; color: var(--text-dim); }
    .card-chevron      { color: var(--text-muted); font-size: 12px; width: 14px; transition: transform .15s ease; }
    .card-header:hover .card-chevron { color: var(--text); }
    .card-title        { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px;
                         letter-spacing: .02em; color: var(--text); }
    .card-header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
    .rate-num  { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted);
                 font-variant-numeric: tabular-nums; }
    .rate-unit { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim);
                 font-variant-numeric: tabular-nums; }
    .item-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600;
                  text-transform: uppercase; letter-spacing: .06em; color: var(--text-dim); }
    .power-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim);
                   opacity: .7; white-space: nowrap; }
    .power-overview { display: flex; align-items: center; justify-content: space-between;
                      background: var(--bg-card); border: 1px solid var(--border-sub);
                      border-left: 3px solid #c8a840; border-radius: 4px;
                      padding: 10px 14px; margin-bottom: 10px; }
    .power-overview-label { font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
                            font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
                            color: #c8a840; }
    .power-overview-values { display: flex; align-items: baseline; gap: 6px; }
    .power-exact { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600;
                   color: var(--text); }
    .power-ceil-note { font-family: 'JetBrains Mono', monospace; font-size: 11px;
                       color: var(--text-dim); }
    .ext-link { color: var(--text-dim); font-size: 11px; text-decoration: none; line-height: 1; }
    .ext-link:hover { color: var(--text-muted); }

    .card-progress      { height: var(--bar-unit); background: var(--bg-input); }
    .card-progress-fill { height: 100%; transition: width .5s; }
    .card-body { padding: 14px 16px; }
    .card-section { margin-bottom: 16px; }
    .card-section:last-child { margin-bottom: 0; }

    table { width: 100%; font-size: 12px; border-collapse: collapse; }
    thead { position: sticky; top: 0; background: var(--bg-card); z-index: 1; }
    thead tr { border-bottom: 1px solid var(--border-sub); }
    th { text-align: left; padding-bottom: 6px; padding-right: 16px; font-weight: 700;
         font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
         letter-spacing: .08em; text-transform: uppercase; color: var(--text-dim); }
    th.r, td.r { text-align: right; }
    th:last-child, td:last-child { padding-right: 0; }
    tbody tr { border-top: 1px solid var(--border-sub); }
    tbody tr.step-io-row { border-top: none; }
    td { padding: 6px 16px 6px 0; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    td.name-col { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; color: var(--text); }
    .step-io-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px;
                    padding: 5px 8px 8px; background: var(--bg-input);
                    border: 1px solid var(--border); border-top: none;
                    border-radius: 0 0 3px 3px; margin-bottom: 2px; }
    .step-io-col { padding: 4px 0 2px 8px; }
    .step-io-col--in  { border-left: 2px solid #5b9fd4; }
    .step-io-col--out { border-left: 2px solid var(--ok); }
    .step-io-sect-label { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 800;
                          letter-spacing: .14em; text-transform: uppercase; margin-bottom: 4px; }
    .step-io-col--in  .step-io-sect-label { color: #5b9fd4; opacity: .7; }
    .step-io-col--out .step-io-sect-label { color: var(--ok); opacity: .7; }
    .step-io-item { display: flex; justify-content: space-between; align-items: baseline;
                    gap: 8px; margin-bottom: 2px; }
    .step-io-item:last-child { margin-bottom: 0; }
    .step-io-name { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 600;
                    white-space: nowrap; }
    .step-io-col--in  .step-io-name { color: #5b9fd4; }
    .step-io-col--out .step-io-name { color: var(--ok); }
    .step-io-rate { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim);
                    white-space: nowrap; flex-shrink: 0; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { font-family: 'JetBrains Mono', monospace; font-size: 11px; background: var(--bg-input);
            border: 1px solid var(--border); border-radius: 3px; padding: 3px 8px; color: var(--text-muted); }

    /* ── Module & beacon chips ── */
    .mod-chip {
      display: inline-flex; align-items: center; gap: 1px;
      padding: 1px 4px; border-radius: 2px;
      font-size: 9px; font-family: 'JetBrains Mono', monospace; font-weight: 700;
      border: 1px solid; white-space: nowrap; line-height: 1.6; vertical-align: middle;
    }
    .mod-chip.type-prod  { background: rgba(210, 90,  30,.09); border-color: rgba(210, 90,  30,.35);  color: #d06020; }
    .mod-chip.type-speed { background: rgba( 30,130,210,.09); border-color: rgba( 30,130,210,.35);  color: #3a9fd4; }
    .mod-chip.type-eff   { background: rgba( 60,180, 60,.08); border-color: rgba( 60,180, 60,.30); color: #50b850; }
    .bcn-chip {
      display: inline-flex; align-items: center; gap: 1px;
      padding: 1px 4px; border-radius: 2px;
      font-size: 9px; font-family: 'JetBrains Mono', monospace; font-weight: 700;
      background: rgba(148,163,184,.10); border: 1px solid rgba(148,163,184,.3); color: #94a3b8;
      white-space: nowrap; line-height: 1.6; vertical-align: middle;
    }
    /* CSS-drawn diamond — avoids glyph-metric variance across Chromium versions/fallback fonts */
    .qdot { display: inline-block; width: 4px; height: 4px; transform: rotate(45deg);
            background: currentColor; vertical-align: middle; margin: 0 0 .15em .3em;
            text-indent: -9999px; overflow: hidden; color: var(--text-dim); }
    .qdot.q-uncommon  { color: #6DFF6D; }
    .qdot.q-rare      { color: #6DA8FF; }
    .qdot.q-epic      { color: #C87DFF; }
    .qdot.q-legendary { color: #FFB347; }
    .bcn-chip .qdot, .mod-chip .qdot, td.name-col .qdot { width: 5px; height: 5px; }
    .bcn-sep { margin: 0 3px; }

    /* ── Issues ── */
    .issue-item { display: flex; align-items: flex-start; gap: 8px; padding: 10px 12px;
                  border-radius: 4px; font-size: 13px; margin-bottom: 8px; }
    .issue-item:last-child { margin-bottom: 0; }
    .issue-item.bad  { background: var(--bad-bg);  border: 1px solid var(--bad-border);
                       border-left: 3px solid var(--bad);  color: var(--bad); }
    .issue-item.good { background: var(--ok-bg);   border: 1px solid var(--ok-border);
                       border-left: 3px solid var(--ok);   color: var(--text-muted); }

    /* ── Chat ── */
    .chat-warning { background: var(--warn-bg); border: 1px solid var(--warn-border);
                    border-left: 3px solid var(--warn);
                    border-radius: 4px; padding: 8px 12px; font-size: 11px; color: var(--warn); margin-bottom: 12px; }
    .chat-messages { overflow-y: auto; margin-bottom: 12px; max-height: 380px;
                     display: flex; flex-direction: column; gap: 10px; }
    .chat-empty { text-align: center; padding: 32px 0; color: var(--text-dim); font-size: 13px; }
    .chat-msg        { display: flex; }
    .chat-msg.player { justify-content: flex-end; }
    .chat-bubble { max-width: 85%; border-radius: 4px; padding: 8px 12px; font-size: 13px; }
    .chat-bubble.player { background: var(--warn-bg); border: 1px solid var(--warn-border);
                          border-left: 3px solid var(--accent); color: var(--text); }
    .chat-bubble.claude { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-muted); }
    .chat-sender { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700;
                   letter-spacing: .08em; text-transform: uppercase; margin-bottom: 4px; opacity: .5; }
    .chat-text   { line-height: 1.55; white-space: pre-wrap; }
    .chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
    .chat-textarea { flex: 1; background: var(--bg-input); border: 1px solid var(--border);
                     border-radius: 4px; color: var(--text); font-family: inherit; font-size: 13px;
                     padding: 8px 10px; resize: none; min-height: 40px; max-height: 120px; line-height: 1.4; }
    .chat-textarea::placeholder { color: var(--text-dim); }
    .chat-textarea:focus { outline: none; border-color: var(--accent); }
    .chat-send { background: var(--accent); border: none; color: #1c1508; border-radius: 4px;
                 width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
                 flex-shrink: 0; font-size: 16px; }
    .chat-send:hover:not(:disabled) { background: var(--accent-hover); }
    .chat-send:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Dialog ── */
    dialog { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
             color: var(--text); padding: 20px; width: 480px; max-width: 90vw; font-family: inherit;
             box-shadow: 0 20px 50px rgba(0,0,0,.5); }
    [data-theme="light"] dialog { box-shadow: 0 20px 50px rgba(0,0,0,.18); }
    dialog::backdrop { background: rgba(0,0,0,.6); }
    dialog h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900;
                letter-spacing: .05em; text-transform: uppercase; margin-bottom: 6px; color: var(--text); }
    dialog p.desc { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
    .dialog-textarea { width: 100%; background: var(--bg-input); border: 1px solid var(--border);
                       border-radius: 4px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 11px;
                       padding: 8px 10px; resize: vertical; min-height: 180px; }
    .dialog-textarea:focus { outline: none; border-color: var(--accent); }
    .dialog-error   { font-size: 11px; color: var(--bad); margin-top: 6px; min-height: 16px; }
    .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }

    /* ── Empties ── */
    .empty-state { text-align: center; padding: 48px 0; color: var(--text-dim); font-size: 13px; }
    .empty-state p + p { margin-top: 4px; font-size: 11px; color: var(--text-dim); opacity: .6; }
    .no-issues { text-align: center; padding: 48px 0; font-size: 13px; color: var(--ok); opacity: .6; }

    /* ── Player notes ── */
    .player-notes { font-size: 12px; color: var(--text-dim); font-style: italic;
                    border-top: 1px solid var(--border-sub); padding-top: 10px; margin-top: -4px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .8s linear infinite; display: inline-block; }

    /* ── Location bar ── */
    .loc-bar { display: flex; align-items: center; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
    .loc-sep  { color: var(--text-dim); padding: 0 2px; font-size: 13px; }
    .loc-btn  { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-muted);
                border-radius: 3px; padding: 3px 10px; height: 26px;
                font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700;
                letter-spacing: .05em; text-transform: uppercase; cursor: pointer; transition: background .12s, color .12s; }
    .loc-btn:hover:not(.active) { background: var(--border); color: var(--text); }
    .loc-btn.active { background: var(--bg-input); color: var(--accent); border-color: var(--accent); border-bottom: 2px solid var(--accent); }

    /* ── Science location chips ── */
    .sci-loc-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .sci-loc-chip  { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500;
                     color: var(--text-dim); background: var(--bg-input);
                     border: 1px solid var(--border-sub); border-radius: 2px; padding: 1px 5px;
                     white-space: nowrap; }
  </style>
</head>
<body>

<div id="app"></div>

<dialog id="export-dialog">
  <h3>Export Factory State</h3>
  <p class="desc">Copy this code to share your factory or import it in another session.</p>
  <textarea class="dialog-textarea" id="export-text" readonly rows="6"></textarea>
  <div class="dialog-actions">
    <button class="btn-cancel" id="export-close">Close</button>
    <button class="btn-primary" id="export-copy">Copy</button>
  </div>
</dialog>

<dialog id="import-dialog">
  <h3>Import Factory State</h3>
  <p class="desc">Paste the exported code from another session below.</p>
  <textarea class="dialog-textarea" id="import-text" placeholder="Paste exported code here…" rows="6"></textarea>
  <p class="dialog-error" id="import-error"></p>
  <div class="dialog-actions">
    <button class="btn-cancel" id="import-cancel">Cancel</button>
    <button class="btn-primary" id="import-apply">Apply</button>
  </div>
</dialog>

<dialog id="add-loc-dialog">
  <h3>Add Location</h3>
  <p class="desc">Add a planet or a named space platform.</p>
  <div class="section-label" style="margin-bottom:6px">Planets</div>
  <div id="add-loc-planets" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px"></div>
  <hr style="border:none;border-top:1px solid var(--border-sub);margin-bottom:14px">
  <div class="section-label" style="margin-bottom:6px">Space Platform</div>
  <div style="display:flex;gap:8px">
    <input id="add-plat-name" class="dialog-textarea"
           style="min-height:unset;height:32px;flex:1;padding:4px 8px;font-size:13px"
           placeholder="Platform name…" maxlength="40">
    <button class="btn-primary" id="btn-add-plat" style="height:32px;padding:0 14px">Add</button>
  </div>
  <div class="dialog-actions" style="margin-top:16px">
    <button class="btn-cancel" id="add-loc-close">Close</button>
  </div>
</dialog>

<script>
// ── Encode / Decode ─────────────────────────────────────────────────────────

function encodeState(state) {
  const json = JSON.stringify(state);
  const bytes = new TextEncoder().encode(json);
  const binary = Array.from(bytes, b => String.fromCharCode(b)).join('');
  return btoa(binary);
}

function decodeState(value) {
  try {
    const binary = atob(value.trim());
    const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
    return JSON.parse(new TextDecoder().decode(bytes));
  } catch {
    return JSON.parse(value); // backward compat: plain JSON
  }
}

// ── Constants ────────────────────────────────────────────────────────────────

const STORAGE_KEY = 'factorio_engineer_state';

const PLANET_IDS    = ['nauvis','vulcanus','fulgora','gleba','aquilo'];
const PLANET_LABELS = { nauvis:'Nauvis', vulcanus:'Vulcanus', fulgora:'Fulgora', gleba:'Gleba', aquilo:'Aquilo' };

function makeLocation(id, type, labelOverride) {
  const lbl = labelOverride ?? PLANET_LABELS[id] ?? id;
  return { id, type, label: lbl, lines: [], bus_items: [], targets: {}, bottlenecks: [], next_steps: [] };
}

const DEFAULT_STATE = {
  save_name: 'My Factory', dataset: 'vanilla', assembler: 3,
  furnace: 'electric', machine_quality: 'normal', beacon_quality: 'normal',
  module_configs: {}, beacon_configs: {}, recipe_overrides: {}, machine_overrides: {},
  research_levels: {},
  preferred_belt: 'blue',
  locations: [makeLocation('nauvis', 'planet')],
  chat_log: [],
};

// Research-tech → recipe-list map; mirror of PRODUCTIVITY_RESEARCH in cli.py.
// The empty recipe list for mining-productivity is intentional: it's a miner-
// wide bonus, not a recipe-keyed bonus.  Used for UI labels, rendering, and
// staleness detection on line cards.
const PRODUCTIVITY_RESEARCH = {
  'mining-productivity':                { label: 'Mining',              recipes: [],                                                                  sa: false },
  'steel-productivity':                 { label: 'Steel',               recipes: ['steel-plate', 'casting-steel'],                                    sa: true  },
  'low-density-structure-productivity': { label: 'Low-Density Structure', recipes: ['low-density-structure', 'casting-low-density-structure'],          sa: true  },
  'scrap-recycling-productivity':       { label: 'Scrap Recycling',     recipes: ['scrap-recycling'],                                                 sa: true  },
  'processing-unit-productivity':       { label: 'Processing Unit',     recipes: ['processing-unit'],                                                 sa: true  },
  'plastic-bar-productivity':           { label: 'Plastic Bar',         recipes: ['plastic-bar', 'bioplastic'],                                       sa: true  },
  'rocket-fuel-productivity':           { label: 'Rocket Fuel',         recipes: ['rocket-fuel', 'rocket-fuel-from-jelly', 'ammonia-rocket-fuel'],    sa: true  },
  'asteroid-productivity':              { label: 'Asteroid Crushing',   recipes: [
    'carbonic-asteroid-crushing', 'oxide-asteroid-crushing', 'metallic-asteroid-crushing',
    'advanced-carbonic-asteroid-crushing', 'advanced-oxide-asteroid-crushing', 'advanced-metallic-asteroid-crushing',
  ], sa: true },
  'rocket-part-productivity':           { label: 'Rocket Part',         recipes: ['rocket-part'],                                                     sa: true  },
};

const SCIENCE_ORDER = [
  'automation-science-pack','logistic-science-pack','military-science-pack',
  'chemical-science-pack','production-science-pack','utility-science-pack',
  'space-science-pack','metallurgic-science-pack','agricultural-science-pack',
  'electromagnetic-science-pack','cryogenic-science-pack','promethium-science-pack',
];

// Official Factorio science pack colors (rgb). Edge cases adjusted:
//   space (255,253,253→near-white), cryogenic (0,20,255→too-dark blue),
//   promethium (30,26,78→near-black) — all shifted to visible mid-range values.
const SCIENCE_COLORS = {
  'automation-science-pack':      [255,  0,  0],
  'logistic-science-pack':        [  0,255, 11],
  'military-science-pack':        [146,166,230],
  'chemical-science-pack':        [  0,230,255],
  'production-science-pack':      [168,  0,255],
  'utility-science-pack':         [255,226,  0],
  'space-science-pack':           [175,195,255],  // adjusted from near-white
  'metallurgic-science-pack':     [255,143,  0],
  'electromagnetic-science-pack': [255,  0,145],
  'agricultural-science-pack':    [210,255,  0],
  'cryogenic-science-pack':       [ 50,105,255],  // adjusted from near-black blue
  'promethium-science-pack':      [115, 95,215],  // adjusted from near-black
};

function sciStyle(name) {
  const [r,g,b] = SCIENCE_COLORS[name] || [128,128,128];
  const dr = Math.round(r*0.35), dg = Math.round(g*0.35), db = Math.round(b*0.35);
  return { solid: `rgb(${r},${g},${b})`, dark: `rgb(${dr},${dg},${db})` };
}

// Flask icon from svgrepo.com (viewBox 36×36).
// Layer 1: filled interior in science color.
// Layer 2: original outline path in --text-muted (softer than full text color).
function sciIcon(color) {
  return `<svg class="science-dot" viewBox="0 0 36 36" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
    <path d="M12,2.5 L24,2.5 L24,4 L21,4 L21,15.5 L29.5,28.5 Q31,34 18,34 Q5,34 6.5,28.5 L15,15.5 L15,4 L12,4 Z" fill="${color}"/>
    <path d="M31.43,27.28,23,14.84V4h1a1,1,0,0,0,0-2H12a1,1,0,0,0,0,2h1V14.84L4.51,27.36A4.29,4.29,0,0,0,5,32.8,4.38,4.38,0,0,0,8.15,34H28a4.24,4.24,0,0,0,3.42-6.72ZM29.85,31a2.62,2.62,0,0,1-2,1H8a2.2,2.2,0,0,1-2.06-1.41,2.68,2.68,0,0,1,.29-2.17l3-4.44,14,0-1.31-2H10.57L15,15.46V4h6V15.46l8.84,13.05A2.23,2.23,0,0,1,29.85,31Z" style="fill:var(--text-muted)"/>
  </svg>`;
}

const MACHINE_NAMES = {
  'assembling-machine-1':'Assembler 1','assembling-machine-2':'Assembler 2',
  'assembling-machine-3':'Assembler 3','stone-furnace':'Stone Furnace',
  'steel-furnace':'Steel Furnace','electric-furnace':'Electric Furnace',
  'chemical-plant':'Chemical Plant','oil-refinery':'Oil Refinery',
  'centrifuge':'Centrifuge','rocket-silo':'Rocket Silo',
  'electric-mining-drill':'Mining Drill','big-mining-drill':'Big Mining Drill',
  'pumpjack':'Pumpjack','offshore-pump':'Offshore Pump',
  'foundry':'Foundry','electromagnetic-plant':'Electromagnetic Plant',
  'cryogenic-plant':'Cryogenic Plant',
  'biochamber':'Biochamber','crusher':'Crusher',
  'agricultural-tower':'Agricultural Tower','captive-spawner':'Captive Spawner',
};

const BELT_COLORS = { yellow:'#d4a817', red:'#c84040', blue:'#4060c8', turbo:'#40c8b8' };
const BELT_THROUGHPUT = { yellow: 900, red: 1800, blue: 2700, turbo: 3600 };
const PUMP_THROUGHPUT = { normal: 72000, uncommon: 93600, rare: 115200, epic: 136800, legendary: 180000 };
const FLUID_ITEM_IDS = new Set([
  'crude-oil','petroleum-gas','light-oil','heavy-oil','water','steam',
  'sulfuric-acid','lubricant','heavy-water','fluorine','ammonia',
  'holmium-solution','calcium-chloride','brine','lava',
]);

const SYSTEM_PROMPT = `You are a Factorio factory co-pilot embedded in a dashboard artifact.

IMPORTANT: If the player reports a factory change, output the COMPLETE updated FACTORY_STATE as a JSON block at the END of your response:
\`\`\`json
{...complete state...}
\`\`\`
Rules: include ALL fields from current state, do NOT include "chat_log".
If no state change, respond naturally with NO JSON block.
Keep responses brief and practical.`;

// ── Helpers ──────────────────────────────────────────────────────────────────

function label(id) {
  return id.replace(/-science-pack$/, ' Science').replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}
function machineLabel(id) { return MACHINE_NAMES[id] || label(id); }
function humanizeText(text) {
  return String(text).replace(
    /\bAM[123]\b|assembling-machine-[123]|\b[a-z]+(?:-[a-z0-9]+)+/g,
    t => MACHINE_NAMES[t] || label(t),
  );
}
function pct(actual, target) {
  if (!target) return 100;
  return Math.min(100, Math.max(0, Math.round((actual / target) * 100)));
}
function statusClass(p) { return p >= 100 ? 'ok' : p >= 75 ? 'warn' : 'bad'; }
function statusColor(p) { return p >= 100 ? 'var(--ok)' : p >= 75 ? 'var(--warn)' : 'var(--bad)'; }
function sortedScienceKeys(keys) {
  return [...keys].sort((a, b) => {
    const ia = SCIENCE_ORDER.indexOf(a), ib = SCIENCE_ORDER.indexOf(b);
    if (ia === -1 && ib === -1) return a.localeCompare(b);
    if (ia === -1) return 1; if (ib === -1) return -1;
    return ia - ib;
  });
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtN(n) {
  const v = Number.isInteger(n) ? n : +n.toFixed(1);
  return v.toLocaleString('en-US');
}
function fmtRB(rate, beltName) {
  const n = +rate;
  const tp = BELT_THROUGHPUT[beltName] ?? 1800;
  return `${fmtN(n)}/min <span style="color:var(--text-dim)">(${(n/tp).toFixed(2)} ${beltName} belt)</span>`;
}
function fmtFluid(rate) {
  const n = +rate;
  const tp = PUMP_THROUGHPUT[STATE.machine_quality] ?? 72000;
  return `${fmtN(n)}/min <span style="color:var(--text-dim)">(${(n/tp).toFixed(2)} pump)</span>`;
}
function fmtRateOnly(rate) {
  return fmtN(+rate) + '/min';
}
function fmtUnitOnly(rate, beltName) {
  const n = +rate;
  const tp = BELT_THROUGHPUT[beltName] ?? 1800;
  return `${(n/tp).toFixed(2)} ${beltName} belt`;
}
function fmtFluidUnitOnly(rate) {
  const n = +rate;
  const tp = PUMP_THROUGHPUT[STATE.machine_quality] ?? 72000;
  return `${(n/tp).toFixed(2)} pump`;
}
function fmtPower(kw) {
  if (kw == null || kw === 0) return null;
  if (kw < 1000) return `${+kw.toFixed(1)} kW`;
  return `${+(kw / 1000).toFixed(2)} MW`;
}
function modChip(m) {
  const abbr = {prod: 'P', speed: 'S', efficiency: 'E'}[m.type] ?? m.type[0].toUpperCase();
  const tCls = {prod: 'type-prod', speed: 'type-speed', efficiency: 'type-eff'}[m.type] ?? '';
  const qdot = m.quality !== 'normal' ? `<span class="qdot q-${m.quality}">◆</span>` : '';
  return `<span class="mod-chip ${tCls}"><span>${m.count}×${abbr}${m.tier}${qdot}</span></span>`;
}
function bcnChip(b, housingQ) {
  const houseDot = housingQ !== 'normal' ? `<span class="qdot q-${housingQ}">◆</span>` : '';
  const modsHtml = (b.modules ?? []).map(m => {
    const abbr = {speed: 'S', efficiency: 'E'}[m.type] ?? m.type[0].toUpperCase();
    const color = {speed: '#009FFF', efficiency: '#4CAF50'}[m.type] ?? '#aaa';
    const qdot  = m.quality !== 'normal' ? `<span class="qdot q-${m.quality}">◆</span>` : '';
    return `<span style="color:${color}">${m.count}×${abbr}${m.tier}${qdot}</span>`;
  }).join('');
  return `<span class="bcn-chip"><span>${b.count}×beacon${houseDot}</span><span class="bcn-sep">/</span><span style="display:inline-flex;align-items:center;gap:3px">${modsHtml}</span></span>`;
}

// ── State ────────────────────────────────────────────────────────────────────

let STATE = { ...DEFAULT_STATE };
let activeTab = 'overview';
let activeLocationIdx = 0;
let expandedCards = new Set();
let storageMode = 'checking';
let chatSending = false;

function currentLoc() {
  return STATE.locations?.[activeLocationIdx] ?? STATE.locations?.[0] ?? makeLocation('nauvis', 'planet');
}

// ── Migration ─────────────────────────────────────────────────────────────────

function migrateState(state) {
  // Ensure research_levels exists so older exported states don't crash the UI.
  if (!state.research_levels || typeof state.research_levels !== 'object') {
    state.research_levels = {};
  }
  if (state.locations) return state; // already new format
  const loc = makeLocation('nauvis', 'planet');
  loc.lines       = state.lines       ?? [];
  loc.bus_items   = state.bus_items   ?? [];
  loc.targets     = state.targets     ?? {};
  loc.bottlenecks = state.bottlenecks ?? [];
  loc.next_steps  = state.next_steps  ?? [];
  const migrated  = { ...state, locations: [loc] };
  delete migrated.location;
  delete migrated.lines;
  delete migrated.bus_items;
  delete migrated.targets;
  delete migrated.bottlenecks;
  delete migrated.next_steps;
  return migrated;
}

// ── Storage ──────────────────────────────────────────────────────────────────

async function saveState() {
  const encoded = encodeState(STATE);
  try { await window.storage?.set(STORAGE_KEY, encoded); return; } catch {}
  try { localStorage.setItem(STORAGE_KEY, encoded); } catch {}
}

async function loadState() {
  try { const r = await window.storage?.get(STORAGE_KEY); if (r?.value) return migrateState(decodeState(r.value)); } catch {}
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return migrateState(decodeState(raw)); } catch {}
  return null;
}

async function checkStorage() {
  if (!window.storage) { storageMode = localStorage ? 'local' : 'none'; return; }
  try {
    await window.storage.set('__ping__', '1');
    await window.storage.delete('__ping__');
    storageMode = 'cloud';
  } catch { storageMode = localStorage ? 'local' : 'none'; }
}

// Aggregate science targets across all locations (max per pack)
function allSciTargets() {
  const t = {};
  for (const loc of STATE.locations ?? [])
    for (const [k, v] of Object.entries(loc.targets ?? {}))
      t[k] = Math.max(t[k] ?? 0, v);
  return t;
}

// Aggregate science rates across all locations.
// Returns { packId: { total, allWip, byLoc: [{label, rate}] } }
// allWip is true when every contributing line has wip:true — used to exclude
// in-progress lines from the SPM bottleneck headline.
function allSciRates() {
  const targets = allSciTargets();
  const result = {};
  for (const loc of STATE.locations ?? []) {
    for (const line of loc.lines ?? []) {
      if (!(line.item in targets)) continue;
      const rate = line.effective_rate ?? line.target_rate ?? 0;
      if (!result[line.item]) result[line.item] = { total: 0, allWip: true, byLoc: [] };
      result[line.item].total += rate;
      if (!line.wip) result[line.item].allWip = false;
      const entry = result[line.item].byLoc.find(e => e.label === loc.label);
      if (entry) entry.rate += rate;
      else result[line.item].byLoc.push({ label: loc.label, rate });
    }
  }
  return result;
}

function renderScience() {
  const targets = allSciTargets();
  const keys = sortedScienceKeys(Object.keys(targets));
  if (!keys.length) return '';
  const rates = allSciRates();

  const activeKeys   = keys.filter(k => !rates[k]?.allWip);
  const effectiveSPM = activeKeys.length ? Math.min(...activeKeys.map(k => rates[k]?.total ?? 0)) : 0;
  const targetSPM    = Math.max(...keys.map(k => targets[k]));
  const spmPct = pct(effectiveSPM, targetSPM);
  const spmCol = statusColor(spmPct);
  const spmHeadline = `
    <div class="spm-headline">
      <span class="spm-number" style="color:${spmCol}">${Math.round(effectiveSPM)}</span>
      <span class="spm-sep">/</span>
      <span class="spm-target">${targetSPM}</span>
      <span class="spm-label">SPM</span>
    </div>`;

  const bars = keys.map(name => {
    const info   = rates[name];
    const actual = info?.total ?? 0;
    const target = targets[name];
    const p = pct(actual, targetSPM);
    const {solid, dark} = sciStyle(name);
    const col = statusColor(p);
    const locCount = (STATE.locations ?? []).length;
    const locChips = locCount <= 1 ? '' : (info?.byLoc ?? []).map(e =>
      `<span class="sci-loc-chip">${esc(e.label)} ${fmtN(e.rate)}/min</span>`
    ).join('');
    return `
      <div class="science-bar">
        <div class="science-bar-header">
          <div class="science-name">
            ${esc(label(name))}
          </div>
          <div class="science-meta">
            <span class="rate-text">${actual}/min</span>
            <span class="pct-text" style="color:${col}">${p}%</span>
          </div>
        </div>
        ${locChips ? `<div class="sci-loc-chips">${locChips}</div>` : ''}
        <div class="progress-track" style="margin-top:${locChips ? '6px' : '0'}">
          <div class="progress-fill" style="width:${p}%;background:linear-gradient(90deg,${dark},${solid})"></div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="science-section">
      <div class="group-label">Science Targets</div>
      ${spmHeadline}
      <div class="science-grid${keys.length >= 4 ? ' cols-2' : ''}">${bars}</div>
    </div>`;
}

// Decide whether a line's cli_result is stale w.r.t. the current STATE.research_levels.
// Returns an array of tech names whose current level differs from what the line was
// calculated against, restricted to techs actually relevant to the line's recipes.
function lineStaleTechs(line) {
  const live = STATE.research_levels ?? {};
  const saved = line.cli_result?.research_levels ?? {};
  const steps = line.cli_result?.production_steps ?? [];
  const recipeKeys = new Set(steps.map(s => s.recipe));
  // A line uses miners if miners_needed has any non-offshore-pump entry.
  const miners = line.cli_result?.miners_needed ?? {};
  const usesMiners = Object.values(miners).some(m => m && m.machine && m.machine !== 'offshore-pump');

  const stale = [];
  for (const [tech, entry] of Object.entries(PRODUCTIVITY_RESEARCH)) {
    const relevant = tech === 'mining-productivity'
      ? usesMiners
      : entry.recipes.some(r => recipeKeys.has(r));
    if (!relevant) continue;
    const liveLvl  = live[tech]  ?? 0;
    const savedLvl = saved[tech] ?? 0;
    if (liveLvl !== savedLvl) stale.push(tech);
  }
  return stale;
}

function renderBusBalance() {
  const loc = currentLoc();
  // Supply: explicitly declared bus_items (player-declared rates)
  const supply = {};
  const busItemMap = {};
  for (const src of loc.bus_items ?? []) {
    supply[src.item] = (supply[src.item] ?? 0) + src.rate;
    busItemMap[src.item] = src;
  }

  // Demand: read bus_inputs from cli_result (set when --bus-item was used for this line)
  const demand = {};
  for (const line of loc.lines ?? [])
    for (const [item, rate] of Object.entries(line.cli_result?.bus_inputs ?? {}))
      demand[item] = (demand[item] ?? 0) + rate;

  // Show all items with supply OR demand
  const busItems = [...new Set([...Object.keys(supply), ...Object.keys(demand)])];
  if (!busItems.length) return '';

  const belt = STATE.preferred_belt;
  const beltTp = BELT_THROUGHPUT[belt] ?? 1800;
  const pumpTp = PUMP_THROUGHPUT[STATE.machine_quality] ?? 72000;

  const renderRow = (item) => {
    const s = supply[item] ?? 0;
    const d = demand[item] ?? 0;
    const net = s - d;
    const usedPct = s > 0 ? Math.min(100, (d / s) * 100) : 100;
    const netCol = net >= 0 ? 'var(--ok)' : 'var(--bad)';
    const sign = net >= 0 ? '+' : '';
    const rowLabel = busItemMap[item]?.label ?? label(item);
    const isFluid = !!(busItemMap[item]?.fluid);
    const netDisplay = isFluid
      ? `${sign}${(Math.abs(net) / pumpTp).toFixed(2)}`
      : `${sign}${(net / beltTp).toFixed(2)}`;
    const unitTag = isFluid ? 'pump' : `${belt} belt`;
    const metaConsumed = isFluid ? `${fmtFluid(d)} consumed` : `${fmtRB(d, belt)} consumed`;
    const metaSupply   = isFluid ? `${fmtFluid(s)} supply`   : `${fmtRB(s, belt)} supply`;
    return `
      <div class="bus-row${isFluid ? ' bus-row--fluid' : ''}">
        <div class="bus-row-header">
          <span class="bus-name">${esc(rowLabel)}</span>
          <div class="bus-net-group">
            <span class="bus-net" style="color:${netCol}">${netDisplay}</span>
            <span class="bus-belt-tag">${unitTag}</span>
          </div>
        </div>
        <div class="bus-bar-track">
          <div class="bus-bar-consumed" style="width:${usedPct}%;background:${usedPct>=100?'var(--bad)':'var(--text-dim)'}"></div>
          <div class="bus-bar-free" style="background:${usedPct>=100?'var(--bad-bg)':usedPct>=80?'var(--warn)':'var(--ok)'}"></div>
        </div>
        <div class="bus-meta">
          <span>${metaConsumed}</span>
          <span>${metaSupply}</span>
        </div>
      </div>`;
  };

  const solids  = busItems.filter(i => !(busItemMap[i]?.fluid));
  const fluids  = busItems.filter(i =>  !!(busItemMap[i]?.fluid));
  const hasBoth = solids.length > 0 && fluids.length > 0;

  const solidGroup = solids.length ? `
    <div class="bus-group">
      ${hasBoth ? `<div class="bus-group-label bus-group-label--belt">Belt Bus</div>` : ''}
      ${solids.map(renderRow).join('')}
    </div>` : '';

  const fluidGroup = fluids.length ? `
    <div class="bus-group">
      ${hasBoth ? `<div class="bus-group-label bus-group-label--pipe">Pipe Network</div>` : ''}
      ${fluids.map(renderRow).join('')}
    </div>` : '';

  return `
    <div class="bus-section">
      <div class="group-label">Bus Balance</div>
      ${solidGroup}${fluidGroup}
    </div>`;
}

const CIRCUIT_ITEMS     = new Set(['electronic-circuit','advanced-circuit','processing-unit']);
const SCIENCE_ITEM_SET  = new Set(SCIENCE_ORDER);

function renderOverview() {
  const loc = currentLoc();

      <div class="power-overview-label">⚡ Power</div>
      <div class="power-overview-values">

    <div class="empty-state">

function renderLinesTab() {
  const loc = currentLoc();
  const lines = loc.lines ?? [];
  if (!lines.length) return `
    <div class="empty-state">
      <p>No production lines yet.</p>
      <p>Ask Claude to plan one in the Chat tab.</p>
    </div>`;

  const idxMap = new Map(lines.map((l, i) => [l, i]));
  const sciLines    = lines.filter(l =>  SCIENCE_ITEM_SET.has(l.item));
  const nonSciLines = lines.filter(l => !SCIENCE_ITEM_SET.has(l.item));

  const groups = [['Science', sciLines], ['Smelting', []], ['Circuits', []], ['Other', []]];
  for (const line of nonSciLines) {
    const machine = line.cli_result?.production_steps?.[0]?.machine;
    if (machine && SMELTING_MACHINES.has(machine)) groups[1][1].push(line);
    else if (CIRCUIT_ITEMS.has(line.item))          groups[2][1].push(line);
    else                                             groups[3][1].push(line);
  }

  let html = '';
  for (const [name, lines] of groups) {
    if (!lines.length) continue;
    html += `<div class="group-label" style="margin:12px 0 8px">${name}</div>`;
    html += lines.map(l => renderLineCard(l, idxMap.get(l))).join('');
  }
  return html;
}

function renderLineCard(line, idx) {
  const actual = line.effective_rate ?? line.target_rate ?? 0;
  const p = pct(actual, line.target_rate ?? 0);
  const sc  = statusClass(p);
  const col = statusColor(p);
  const isOpen = expandedCards.has(idx);
  const steps  = line.cli_result?.production_steps ?? [];
  const belt       = line.cli_result?.belt;
  const beltsNeeded = line.cli_result?.belts_needed;
  const raw    = line.cli_result?.raw_resources ?? {};
  const miners = line.cli_result?.miners_needed ?? {};
  const isFluid = !!(line.fluid) || FLUID_ITEM_IDS.has(line.item);
  const fmtRate = (rate, beltName) => isFluid ? fmtFluid(rate) : fmtRB(rate, beltName);

  let body = '';
  if (isOpen) {
    const clir       = line.cli_result ?? {};
    const modCfgs      = clir.module_configs          ?? {};
    const beaconCfgs   = clir.beacon_configs          ?? {};
    const defaultBcn   = clir.default_beacon          ?? null;
    const recModOvr    = clir.recipe_module_overrides ?? {};
    const recBcnOvr    = clir.recipe_beacon_overrides ?? {};
    const housingQ     = clir.beacon_quality  ?? 'normal';
    const machineQ     = clir.machine_quality ?? 'normal';

    const machineRows = steps.map(s => {
      const stepPow = fmtPower(s.power_kw);
      const beaconPow = s.beacon_power_kw > 0 ? fmtPower(s.beacon_power_kw) : null;
      const powCell = stepPow
        ? (beaconPow ? `${stepPow} <span style="color:var(--text-dim)">+${beaconPow} beacon</span>` : stepPow)
        : '—';

      const mods    = recModOvr[s.recipe] ?? modCfgs[s.machine]    ?? [];
      const beacon  = recBcnOvr[s.recipe] ?? beaconCfgs[s.machine] ?? defaultBcn ?? null;
      const modHtml = mods.map(modChip).join(' ');
      const bcnHtml = beacon ? bcnChip(beacon, housingQ) : '';
      const bonusHtml = s.beacon_speed_bonus > 0
        ? `<span style="font-size:9px;color:var(--text-dim)">+${(s.beacon_speed_bonus * 100).toFixed(1)}%</span>`
        : '';
      const chipRow = [modHtml, bcnHtml, bonusHtml].filter(Boolean).join(' ');
      const qualDot = machineQ !== 'normal' ? `<span class="qdot q-${machineQ}">◆</span>` : '';

      const belt = STATE.preferred_belt;
      const inEntries = Object.entries(s.inputs ?? {});
      const outEntries = Object.entries(s.outputs ?? {});
      const mkItems = (entries) => entries.map(([item, rate]) => {
        const isF = FLUID_ITEM_IDS.has(item);
        const rateStr = isF ? fmtFluid(rate) : fmtRB(rate, belt);
        return `<div class="step-io-item"><span class="step-io-name">${esc(label(item))}</span><span class="step-io-rate">${rateStr}</span></div>`;
      }).join('');
      const ioRow = (inEntries.length || outEntries.length) ? `<tr class="step-io-row"><td colspan="4" style="padding-top:0;padding-right:0"><div class="step-io-grid">
        <div class="step-io-col step-io-col--in"><div class="step-io-sect-label">Inputs</div>${mkItems(inEntries)}</div>
        <div class="step-io-col step-io-col--out"><div class="step-io-sect-label">Outputs</div>${mkItems(outEntries)}</div>
      </div></td></tr>` : '';

      return `<tr>
        <td>${esc(label(s.recipe))}</td>
        <td class="name-col"><span style="display:inline-flex;align-items:center;gap:3px;line-height:1">${esc(machineLabel(s.machine))}${qualDot}</span>${chipRow ? `<div style="margin-top:3px;line-height:1.8">${chipRow}</div>` : ''}</td>
        <td class="r">${s.machine_count_ceil}</td>
        <td class="r" style="color:var(--text-dim)">${powCell}</td>
      </tr>${ioRow}`;
    }).join('');

    const totalPow = line.cli_result?.total_power_mw;
    const totalPowCeil = line.cli_result?.total_power_mw_ceil;
    const totalPowStr = totalPowCeil != null ? fmtPower(totalPowCeil * 1000) : null;

    const machineSection = steps.length ? `
      <div class="card-section">
        <div class="section-label">Machines${totalPowStr ? ` <span style="color:var(--text-dim);font-weight:400;font-size:10px;margin-left:8px">⚡ ${totalPowStr} total (ceil)</span>` : ''}</div>
        <table>
          <thead><tr><th>Recipe</th><th>Machine</th><th class="r">Count</th><th class="r">Power</th></tr></thead>
          <tbody>${machineRows}</tbody>

      </div>` : '';

    const busInputs = line.cli_result?.bus_inputs ?? {};
    const busInputSection = Object.keys(busInputs).length ? `
      <div class="card-section">
        <div class="section-label">Bus Inputs</div>
        <div class="chips">${Object.entries(busInputs).map(([r, rate]) => {
          const b = STATE.preferred_belt;
          const fmt = FLUID_ITEM_IDS.has(r) ? fmtFluid(rate) : fmtRB(rate, b);
          return `<span class="chip">${esc(label(r))}: <span style="color:var(--text)">${fmt}</span></span>`;
        }).join('')}</div>
      </div>` : '';

    const ownRaw = Object.entries(raw);
    const ownMiners = Object.entries(miners);

    const rawSection = ownRaw.length ? `
      <div class="card-section">
        <div class="section-label">Raw Resources</div>
        <div class="chips">${ownRaw.map(([r, rate]) => {
          const fmt = FLUID_ITEM_IDS.has(r) ? fmtFluid(rate) : fmtRB(rate, STATE.preferred_belt);
          return `<span class="chip">${esc(label(r))}: <span style="color:var(--text)">${fmt}</span></span>`;
        }).join('')}</div>
      </div>` : '';

    const minerSection = ownMiners.length ? `
      <div class="card-section">
        <div class="section-label">Miners / Extractors</div>
        <div class="chips">${ownMiners.map(([r, info]) => {
          const isYield = info.required_yield_pct != null;
          const count   = isYield ? `${info.required_yield_pct.toFixed(1)}% yield` : `${info.machine_count_ceil}×`;
          const countCl = isYield ? 'var(--warn)' : 'var(--text)';
          const powStr  = info.power_kw ? fmtPower(info.power_kw) : null;
          return `<span class="chip">${esc(label(r))}: <span style="color:${countCl};font-weight:600">${count}</span> <span style="color:var(--text-dim)">${esc(machineLabel(info.machine))}${powStr ? ` · ⚡${powStr}` : ''}</span></span>`;
        }).join('')}</div>
      </div>` : '';

    const coProds = Object.entries(line.cli_result?.co_products ?? {});
    const primaryRate = line.effective_rate ?? line.target_rate ?? 0;
    const primaryFmt = isFluid ? fmtFluid(primaryRate) : fmtRB(primaryRate, STATE.preferred_belt);
    const outputChips = [
      `<span class="chip">${esc(label(line.item))}: <span style="color:var(--ok)">${primaryFmt}</span></span>`,
      ...coProds.map(([r, rate]) => {
        const fmt = FLUID_ITEM_IDS.has(r) ? fmtFluid(rate) : fmtRB(rate, STATE.preferred_belt);
        return `<span class="chip">${esc(label(r))}: <span style="color:var(--ok)">${fmt}</span></span>`;
      })
    ].join('');
    const coProductSection = `
      <div class="card-section">
        <div class="section-label">Outputs</div>
        <div class="chips">${outputChips}</div>
      </div>`;

    const noteSection = line.player_notes ? `
      <div class="player-notes">${esc(line.player_notes)}</div>` : '';

    body = `<div class="card-body">${machineSection}${coProductSection}${busInputSection}${rawSection}${minerSection}${noteSection}</div>`;
  }

  const cardClass   = line.wip ? 'wip' : sc;
  const displayRate = line.wip ? (line.target_rate ?? 0) : actual;
  const stale = lineStaleTechs(line);
  const cappedHere = line.cli_result?.research_prod_capped === true;
  const chips = [
    stale.length ? `<span class="card-chip stale" title="Research changed since this line was planned: ${stale.map(t => PRODUCTIVITY_RESEARCH[t]?.label ?? t).join(', ')}">⟳ stale</span>` : '',
    cappedHere    ? `<span class="card-chip capped" title="A step on this line is at the +300% prod cap; more research levels won't reduce its machine count.">@300% cap</span>` : '',
  ].filter(Boolean).join(' ');
  return `
    <div class="line-card ${cardClass}">
      <div class="card-header ${cardClass}" data-card="${idx}" aria-expanded="${isOpen}" title="${isOpen ? 'Collapse' : 'Expand'}">
        <div class="card-header-left">
          <span class="card-chevron">${isOpen ? '▼' : '▶'}</span>
          <div class="card-title-group">
            <span class="card-title">${esc(line.label ?? label(line.item))}${line.wip ? '<span class="wip-badge">WIP</span>' : ''}${chips ? ` ${chips}` : ''}</span>
            <span class="card-subtitle">${esc(label(line.item))}</span>
          </div>
        </div>
        <div class="card-header-right">
          <span class="rate-num">${fmtRateOnly(displayRate)}</span>
          <span class="rate-unit">${isFluid ? fmtFluidUnitOnly(displayRate) : fmtUnitOnly(displayRate, belt ?? STATE.preferred_belt)}</span>
        </div>
      </div>
      ${body}
    </div>`;
}

function renderIssues() {
  const loc = currentLoc();
  const ns = loc.next_steps ?? [];
  if (!ns.length)
    return '<div class="no-issues">✓ No next steps.</div>';
  const nsHtml = [
    `<div class="group-label" style="margin-bottom:8px">Next Steps</div>`,
    ...ns.map(s => `<div class="issue-item"><span style="color:var(--accent)">→</span><span>${esc(humanizeText(s))}</span></div>`),
  ];
  return nsHtml.join('');
}

function renderChat() {
  const avail = typeof window.claude?.complete === 'function';
  const warnDismissed = localStorage.getItem('chat_warn_dismissed') === '1';
  const warning = (avail || warnDismissed) ? '' : `<div class="chat-warning" style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><span>window.claude.complete is not available — sign into Claude.ai for chat to work.</span><button class="btn-cancel" style="padding:0 6px;height:auto;font-size:10px;flex-shrink:0" id="btn-dismiss-chat-warn">✕</button></div>`;
  const msgs = STATE.chat_log.length
    ? STATE.chat_log.map(e => `
        <div class="chat-msg ${e.from}">
          <div class="chat-bubble ${e.from}">
            <div class="chat-sender">${e.from === 'player' ? 'You' : 'Claude'}</div>
            <div class="chat-text">${esc(humanizeText(e.text))}</div>
          </div>
        </div>`).join('')
    : '<div class="chat-empty">No messages yet. Ask about your factory — strategy, machine counts, next steps.</div>';
  return `
    ${warning}
    <div class="chat-messages" id="chat-messages">${msgs}</div>
    <div class="chat-input-row">
      <textarea class="chat-textarea" id="chat-input" rows="2"
        placeholder="Ask about your factory… (Enter to send, Shift+Enter for newline)"
        ${chatSending || !avail ? 'disabled' : ''}></textarea>
      <button class="chat-send" id="btn-send" ${chatSending || !avail ? 'disabled' : ''}>
        ${chatSending ? '<span class="spin">⟳</span>' : '↑'}
      </button>
    </div>`;
}

function render() {
  document.getElementById('app').innerHTML = `
    ${renderHeader()}
    <div class="main">
      <div class="main-inner">
        ${(s => s + (s ? '<hr class="loc-divider">' : ''))(renderScience())}
        ${renderResearch()}
        ${(STATE.dataset ?? 'vanilla') !== 'vanilla' ? renderLocationBar() : ''}
        ${renderBottlenecks()}
        ${renderTabs()}
        <div class="tab-panel${activeTab==='overview'?' active':''}">${renderOverview()}</div>
        <div class="tab-panel${activeTab==='lines'  ?' active':''}">${renderLinesTab()}</div>
        <div class="tab-panel${activeTab==='issues' ?' active':''}">${renderIssues()}</div>
        <div class="tab-panel${activeTab==='chat'   ?' active':''}">${renderChat()}</div>
      </div>
    </div>`;
  bindEvents();
  if (activeTab === 'chat') scrollChat();
}

function scrollChat() {
  const el = document.getElementById('chat-messages');
  if (el) el.scrollTop = el.scrollHeight;
}

// ── Events ───────────────────────────────────────────────────────────────────

function bindEvents() {
  document.querySelectorAll('.tab-btn').forEach(btn =>
    btn.addEventListener('click', () => { activeTab = btn.dataset.tab; render(); }));

  document.querySelectorAll('.loc-btn[data-locidx]').forEach(btn =>
    btn.addEventListener('click', () => {
      activeLocationIdx = +btn.dataset.locidx;
      expandedCards = new Set();
      render();
    }));

  document.getElementById('btn-add-loc')?.addEventListener('click', () => {
    openAddLocDialog();
    document.getElementById('add-loc-dialog').showModal();
  });

  document.querySelectorAll('.card-header[data-card]').forEach(hdr =>
    hdr.addEventListener('click', e => {
      const idx = +hdr.dataset.card;
      expandedCards.has(idx) ? expandedCards.delete(idx) : expandedCards.add(idx);
      render();
    }));

  document.getElementById('research-toggle')?.addEventListener('click', () => {
    researchOpen = !researchOpen;
    render();
  });

  document.querySelectorAll('.research-input[data-research]').forEach(input =>
    input.addEventListener('change', () => {
      const key = input.dataset.research;
      const lvl = Math.max(0, parseInt(input.value, 10) || 0);
      STATE.research_levels = STATE.research_levels ?? {};
      if (lvl > 0) STATE.research_levels[key] = lvl;
      else         delete STATE.research_levels[key];
      saveState();
      render();
    }));

  const btnExport = document.getElementById('btn-export');
  if (btnExport) btnExport.addEventListener('click', () => {
    document.getElementById('export-text').value = encodeState(STATE);
    document.getElementById('export-dialog').showModal();
  });

  const btnImport = document.getElementById('btn-import');
  if (btnImport) btnImport.addEventListener('click', () => {
    document.getElementById('import-text').value = '';
    document.getElementById('import-error').textContent = '';
    document.getElementById('import-dialog').showModal();
  });

  const btnTheme = document.getElementById('btn-theme');
  if (btnTheme) btnTheme.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme')
      || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    const next = cur === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    render();
  });

  const btnReset = document.getElementById('btn-reset');
  if (btnReset) btnReset.addEventListener('click', () => {
    if (confirm('Reset all factory data? This cannot be undone.')) {
      STATE = { ...DEFAULT_STATE }; activeLocationIdx = 0; saveState(); render();
    }
  });

  const btnDismissChatWarn = document.getElementById('btn-dismiss-chat-warn');
  if (btnDismissChatWarn) btnDismissChatWarn.addEventListener('click', () => {
    localStorage.setItem('chat_warn_dismissed', '1');
    render();
  });

  const btnSend  = document.getElementById('btn-send');
  const chatArea = document.getElementById('chat-input');
  if (btnSend)  btnSend.addEventListener('click', sendChat);
  if (chatArea) chatArea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });
}

// ── Chat ─────────────────────────────────────────────────────────────────────

function buildPrompt(userMessage) {
  const { chat_log: _, ...stateForPrompt } = STATE;
  const history = STATE.chat_log.slice(-10).map(m => `${m.from === 'player' ? 'PLAYER' : 'CLAUDE'}: ${m.text}`).join('\n');
  return `${SYSTEM_PROMPT}\n\nCURRENT FACTORY STATE:\n${JSON.stringify(stateForPrompt, null, 2)}\n\nCONVERSATION:\n${history}\nPLAYER: ${userMessage}\n\nCLAUDE:`;
}

function parseResponse(response) {
  const match = response.match(/```json\s*([\s\S]*?)\s*```/);
  if (!match) return { text: response.trim(), newState: null };
  const text = response.replace(/```json[\s\S]*?```/, '').trim();
  try { return { text, newState: JSON.parse(match[1]) }; } catch { return { text: response.trim(), newState: null }; }
}

async function sendChat() {
  if (chatSending) return;
  const input = document.getElementById('chat-input');
  const text = input?.value.trim();
  if (!text) return;
  input.value = '';
  chatSending = true;

  const fullLog = [...STATE.chat_log, { from: 'player', text }];
  STATE = { ...STATE, chat_log: fullLog };
  render(); scrollChat();

  try {
    if (!window.claude?.complete) throw new Error('window.claude.complete not available');
    const response = await window.claude.complete(buildPrompt(text));
    const { text: replyText, newState } = parseResponse(response);
    const replyLog = [...fullLog, { from: 'claude', text: replyText || '(state updated)' }];
    STATE = newState ? { ...newState, chat_log: replyLog } : { ...STATE, chat_log: replyLog };
    await saveState();
  } catch (e) {
    STATE = { ...STATE, chat_log: [...fullLog, { from: 'claude', text: `Error: ${e.message}` }] };
  } finally {
    chatSending = false;
    render(); scrollChat();
  }
}

// ── Add Location ─────────────────────────────────────────────────────────────

function openAddLocDialog() {
  const existingIds = new Set((STATE.locations ?? []).map(l => l.id));
  const available = PLANET_IDS.filter(id => !existingIds.has(id));
  const container = document.getElementById('add-loc-planets');
  container.innerHTML = available.length
    ? available.map(id =>
        `<button class="btn" style="text-transform:uppercase;font-size:12px" data-planet="${esc(id)}">${esc(PLANET_LABELS[id])}</button>`
      ).join('')
    : `<span style="color:var(--text-dim);font-size:12px">All planets already added.</span>`;
  container.querySelectorAll('[data-planet]').forEach(btn =>
    btn.addEventListener('click', () => addPlanetLocation(btn.dataset.planet)));
  document.getElementById('add-plat-name').value = '';
}

function addPlanetLocation(id) {
  STATE = { ...STATE, locations: [...(STATE.locations ?? []), makeLocation(id, 'planet')] };
  activeLocationIdx = STATE.locations.length - 1;
  saveState(); render();
  document.getElementById('add-loc-dialog').close();
}

function addPlatformLocation() {
  const nameEl = document.getElementById('add-plat-name');
  const name = nameEl?.value.trim();
  if (!name) return;
  const n = (STATE.locations ?? []).filter(l => l.type === 'space-platform').length;
  const id = `space-platform-${n}`;
  STATE = { ...STATE, locations: [...(STATE.locations ?? []), makeLocation(id, 'space-platform', name)] };
  activeLocationIdx = STATE.locations.length - 1;
  saveState(); render();
  document.getElementById('add-loc-dialog').close();
}

document.getElementById('add-loc-close').addEventListener('click', () =>
  document.getElementById('add-loc-dialog').close());
document.getElementById('btn-add-plat').addEventListener('click', addPlatformLocation);
document.getElementById('add-plat-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); addPlatformLocation(); }
});

// ── Export / Import dialogs (outside render cycle) ───────────────────────────

document.getElementById('export-close').addEventListener('click', () =>
  document.getElementById('export-dialog').close());
document.getElementById('export-copy').addEventListener('click', () =>
  navigator.clipboard.writeText(document.getElementById('export-text').value));

document.getElementById('import-cancel').addEventListener('click', () =>
  document.getElementById('import-dialog').close());

document.getElementById('import-apply').addEventListener('click', () => {
  const text = document.getElementById('import-text').value.trim();
  try {
    STATE = migrateState(decodeState(text));
    activeLocationIdx = 0;
    saveState();
    document.getElementById('import-dialog').close();
    render();
  } catch (e) {
    document.getElementById('import-error').textContent = 'Invalid data: ' + e.message;
  }
});

// ── Init ─────────────────────────────────────────────────────────────────────

(async () => {
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
  await checkStorage();
  const saved = await loadState();
  if (saved) STATE = saved;
  const params = new URLSearchParams(location.search);
  const tabParam = params.get('tab');
  if (tabParam && ['overview','lines','issues','chat'].includes(tabParam)) activeTab = tabParam;
  if (params.get('expand') === 'all') {
    expandedCards = new Set((currentLoc().lines ?? []).map((_, i) => i));
  }
  render();
})();
</script>
</body>
